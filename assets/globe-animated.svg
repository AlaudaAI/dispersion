<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for globe -->
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7cff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a5bd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1b4b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for rings -->
    <linearGradient id="ringGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB524;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#FFB524;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB524;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="ringGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8b4ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#a8b4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8b4ff;stop-opacity:0" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Globe clip path -->
    <clipPath id="globeClip">
      <circle cx="200" cy="200" r="80"/>
    </clipPath>
  </defs>
  
  <!-- Outer glow -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="url(#ringGradient2)" stroke-width="1" opacity="0.3" filter="url(#glow)">
    <animate attributeName="r" values="90;95;90" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Ring 3 - Outermost -->
  <ellipse cx="200" cy="200" rx="150" ry="40" fill="none" stroke="url(#ringGradient1)" stroke-width="2" opacity="0.4" transform="rotate(-20 200 200)">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1;3;1" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Ring 2 - Middle -->
  <ellipse cx="200" cy="200" rx="120" ry="35" fill="none" stroke="url(#ringGradient2)" stroke-width="2" opacity="0.5" transform="rotate(15 200 200)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="stroke-width" values="1;4;1" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </ellipse>
  
  <!-- Ring 1 - Inner -->
  <ellipse cx="200" cy="200" rx="100" ry="25" fill="none" stroke="url(#ringGradient1)" stroke-width="2" opacity="0.6" transform="rotate(-10 200 200)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="stroke-width" values="2;5;2" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </ellipse>
  
  <!-- Globe base -->
  <circle cx="200" cy="200" r="80" fill="url(#globeGradient)"/>
  
  <!-- Globe highlight -->
  <ellipse cx="175" cy="175" rx="30" ry="25" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Rotating globe content group -->
  <g clip-path="url(#globeClip)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite"/>
      
      <!-- Continent shapes (simplified) -->
      <!-- Americas -->
      <path d="M160 140 Q150 160, 155 180 Q160 200, 150 220 Q145 240, 160 260 L165 250 Q175 230, 170 210 Q165 190, 175 170 Q180 155, 170 140 Z" 
            fill="rgba(255,181,36,0.7)" stroke="rgba(255,181,36,0.9)" stroke-width="1"/>
      
      <!-- Europe/Africa -->
      <path d="M210 145 Q220 160, 215 180 Q210 200, 220 230 Q225 250, 210 265 L205 255 Q200 235, 205 210 Q210 185, 200 160 Q195 145, 205 140 Z" 
            fill="rgba(255,181,36,0.7)" stroke="rgba(255,181,36,0.9)" stroke-width="1"/>
      
      <!-- Asia -->
      <path d="M250 150 Q270 165, 265 185 Q260 200, 270 215 Q275 225, 260 240 L255 230 Q250 215, 255 195 Q260 175, 245 160 Z" 
            fill="rgba(255,181,36,0.7)" stroke="rgba(255,181,36,0.9)" stroke-width="1"/>
      
      <!-- Additional landmass for seamless rotation -->
      <path d="M300 155 Q315 170, 310 190 Q305 205, 315 220 L310 215 Q305 200, 308 180 Q310 165, 300 155 Z" 
            fill="rgba(255,181,36,0.6)" stroke="rgba(255,181,36,0.8)" stroke-width="1"/>
      
      <!-- Grid lines -->
      <g stroke="rgba(168,180,255,0.3)" stroke-width="0.5" fill="none">
        <!-- Latitude lines -->
        <ellipse cx="200" cy="160" rx="75" ry="20"/>
        <ellipse cx="200" cy="200" rx="80" ry="25"/>
        <ellipse cx="200" cy="240" rx="75" ry="20"/>
        
        <!-- Longitude lines -->
        <ellipse cx="200" cy="200" rx="20" ry="80" transform="rotate(0 200 200)"/>
        <ellipse cx="200" cy="200" rx="20" ry="80" transform="rotate(30 200 200)"/>
        <ellipse cx="200" cy="200" rx="20" ry="80" transform="rotate(60 200 200)"/>
        <ellipse cx="200" cy="200" rx="20" ry="80" transform="rotate(90 200 200)"/>
        <ellipse cx="200" cy="200" rx="20" ry="80" transform="rotate(120 200 200)"/>
        <ellipse cx="200" cy="200" rx="20" ry="80" transform="rotate(150 200 200)"/>
      </g>
    </g>
  </g>
  
  <!-- Orbiting dots -->
  <g>
    <circle r="4" fill="#FFB524" filter="url(#glow)">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbitPath1"/>
      </animateMotion>
    </circle>
  </g>
  
  <g>
    <circle r="3" fill="#a8b4ff" filter="url(#glow)">
      <animateMotion dur="8s" repeatCount="indefinite" begin="2s">
        <mpath href="#orbitPath2"/>
      </animateMotion>
    </circle>
  </g>
  
  <g>
    <circle r="5" fill="#FFB524" filter="url(#glow)">
      <animateMotion dur="10s" repeatCount="indefinite" begin="4s">
        <mpath href="#orbitPath3"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- Hidden orbit paths -->
  <defs>
    <path id="orbitPath1" d="M 50,200 A 150,40 -20 1,1 350,200 A 150,40 -20 1,1 50,200" fill="none"/>
    <path id="orbitPath2" d="M 80,200 A 120,35 15 1,1 320,200 A 120,35 15 1,1 80,200" fill="none"/>
    <path id="orbitPath3" d="M 100,200 A 100,25 -10 1,1 300,200 A 100,25 -10 1,1 100,200" fill="none"/>
  </defs>
  
  <!-- Pulse effect at center -->
  <circle cx="200" cy="200" r="85" fill="none" stroke="rgba(168,180,255,0.5)" stroke-width="2">
    <animate attributeName="r" values="82;100;82" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
